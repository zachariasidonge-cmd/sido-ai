<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Sido AI - Kenya's Business Assistant 🇰🇪</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(0, 150, 0, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(0, 200, 0, 0.05) 0%, transparent 50%);
        }
        
        /* ===== MAIN CONTAINER ===== */
        .chat-container {
            width: 100%;
            max-width: 480px;
            background: #14141c;
            border-radius: 24px;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.04);
            overflow: hidden;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #0d1f0d, #1a3a1a);
            padding: 22px 24px 18px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 0, 0.08);
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00cc00, transparent);
            border-radius: 2px;
        }
        
        .header h1 {
            color: #fff;
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .header .flag {
            display: inline-block;
            animation: wave 2s ease-in-out infinite;
        }
        
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }
        
        .header .subtitle {
            color: rgba(0, 255, 0, 0.7);
            font-size: clamp(12px, 2.5vw, 14px);
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }
        
        .header .status-badge {
            display: inline-block;
            background: rgba(0, 255, 0, 0.12);
            color: #00cc00;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: 6px;
            border: 1px solid rgba(0, 255, 0, 0.15);
            letter-spacing: 0.5px;
        }
        
        /* ===== MESSAGES AREA ===== */
        .messages {
            height: clamp(350px, 55vh, 520px);
            overflow-y: auto;
            padding: 18px 16px 12px;
            background: #0f0f17;
            scroll-behavior: smooth;
        }
        
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 0, 0.3);
            border-radius: 10px;
        }
        
        /* ===== MESSAGES ===== */
        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 90%;
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: clamp(14px, 3vw, 15px);
            line-height: 1.6;
            word-wrap: break-word;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .message.user {
            background: linear-gradient(135deg, #1a4a1a, #0d2f0d);
            color: #e8f5e9;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(0, 255, 0, 0.08);
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.05);
        }
        
        .message.sido {
            background: #1a1a26;
            color: #e0e0e8;
            border-left: 3px solid #00cc00;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-left-width: 3px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .message.sido strong {
            color: #4caf50;
            font-weight: 600;
        }
        
        .message.sido small {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
        }
        
        .message .time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 6px;
            display: block;
        }
        
        /* ===== TYPING INDICATOR ===== */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            background: #1a1a26;
            border-radius: 14px;
            border-left: 3px solid #00cc00;
            max-width: 80px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-left-width: 3px;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }
        
        /* ===== SUGGESTIONS ===== */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 16px 14px;
            background: #11111b;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        
        .suggestions button {
            padding: 6px 14px;
            background: rgba(0, 255, 0, 0.06);
            color: #90caf9;
            border: 1px solid rgba(0, 255, 0, 0.08);
            border-radius: 20px;
            font-size: clamp(11px, 2vw, 12px);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }
        
        .suggestions button:hover {
            background: rgba(0, 255, 0, 0.15);
            border-color: rgba(0, 255, 0, 0.3);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.1);
        }
        
        .suggestions button:active {
            transform: scale(0.96);
        }
        
        .suggestions .icon {
            margin-right: 4px;
        }
        
        /* ===== INPUT AREA ===== */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px 16px;
            background: #11111b;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: #1a1a28;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 25px;
            font-size: clamp(14px, 3vw, 15px);
            color: #e8e8f0;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
        }
        
        .input-area input:focus {
            border-color: rgba(0, 255, 0, 0.3);
            background: #1e1e30;
            box-shadow: 0 0 0 3px rgba(0, 255, 0, 0.05);
        }
        
        .input-area button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #00a300, #006600);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: clamp(13px, 2.5vw, 14px);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0, 200, 0, 0.15);
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 200, 0, 0.25);
            background: linear-gradient(135deg, #00cc00, #008800);
        }
        
        .input-area button:active {
            transform: scale(0.96);
        }
        
        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 10px 16px 12px;
            background: #0a0a12;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .footer p {
            color: rgba(255, 255, 255, 0.12);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        
        .footer .heart {
            color: #ff1744;
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            body { padding: 8px; }
            .chat-container { border-radius: 18px; }
            .header { padding: 18px 18px 14px; }
            .messages { padding: 14px 12px 10px; }
            .suggestions { padding: 8px 12px 12px; gap: 5px; }
            .input-area { padding: 10px 12px 14px; gap: 8px; }
            .input-area input { padding: 10px 14px; }
            .input-area button { padding: 10px 16px; }
            .message { padding: 10px 14px; font-size: 14px; }
        }
        
        @media (max-width: 380px) {
            .suggestions button { font-size: 10px; padding: 4px 10px; }
            .header h1 { font-size: 20px; }
        }
        
        @media (min-width: 768px) {
            .chat-container { max-width: 520px; }
            .messages { height: 480px; }
        }
        
        /* ===== DARK THEME SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 0, 0.2);
            border-radius: 10px;
        }
        
        /* ===== SELECTION ===== */
        ::selection {
            background: rgba(0, 255, 0, 0.15);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- HEADER -->
        <div class="header">
            <h1>
                <span class="flag">🇰🇪</span> Sido AI
            </h1>
            <div class="subtitle">Kenya's Smartest Business Assistant</div>
            <div class="status-badge">● Powered by Groq AI</div>
        </div>

        <!-- MESSAGES -->
        <div class="messages" id="messages">
            <div class="message sido">
                <strong>Sido AI:</strong> Habari! 👋 I'm Sido AI, your digital business assistant. How can I help you today?<br>
                <small>Try: "Create a business plan" or "Help me find a job"</small>
            </div>
        </div>

        <!-- SUGGESTIONS -->
        <div class="suggestions">
            <button onclick="quickQuestion('Create a business plan for a salon')">
                <span class="icon">✏️</span> Business Plan
            </button>
            <button onclick="quickQuestion('Write my CV')">
                <span class="icon">📄</span> CV Writer
            </button>
            <button onclick="quickQuestion('Find tenders in Kenya')">
                <span class="icon">🔍</span> Tenders
            </button>
            <button onclick="quickQuestion('Generate an invoice')">
                <span class="icon">🧾</span> Invoice
            </button>
            <button onclick="quickQuestion('Marketing content for Facebook')">
                <span class="icon">📱</span> Marketing
            </button>
            <button onclick="quickQuestion('How do I register a business in Kenya?')">
                <span class="icon">📋</span> Register
            </button>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <input 
                id="userInput" 
                type="text" 
                placeholder="Ask me anything about business..." 
                autocomplete="off"
            />
            <button onclick="sendMessage()">Send →</button>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>Made with <span class="heart">❤</span> for Kenya</p>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');

        function quickQuestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <span></span>
                <span></span>
                <span></span>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function formatMessage(text) {
            // Convert line breaks to <br>
            return text.replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message
            messagesDiv.innerHTML += `
                <div class="message user">
                    ${formatMessage(message)}
                </div>
            `;
            userInput.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Show typing indicator
            addTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error('Server error');
                const data = await response.json();

                removeTypingIndicator();
                messagesDiv.innerHTML += `
                    <div class="message sido">
                        <strong>Sido AI:</strong> ${formatMessage(data.response)}
                    </div>
                `;
            } catch (error) {
                removeTypingIndicator();
                messagesDiv.innerHTML += `
                    <div class="message sido">
                        <strong>Sido AI:</strong> ⚠️ Sorry, I'm having trouble connecting. Please try again.
                    </div>
                `;
            }

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Enter key support
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-focus input on load
        window.addEventListener('load', function() {
            userInput.focus();
        });
    </script>
</body>
</html>
